<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>PUNGVER</title>

  <!-- Mobile Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="pungver-32x32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="pungver-192x192.png">
  <link rel="apple-touch-icon" href="pungver-192x192.png">

  <!-- Theme color -->
  <meta name="theme-color" content="#000000">

  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* โปร่งใสจริง */
    html, body {
      height: 100%;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, Helvetica, sans-serif;
      flex-direction: column;
    }

    /* โลโก้ */
    .logo {
      width: 220px;
      max-width: 80%;
      height: auto;
      animation: float 3s ease-in-out infinite;
    }

    /* ตัวหนังสือ */
    h1 {
      margin-top: 20px;
      color: #D4AF37;
      letter-spacing: 6px;
      font-size: 28px;
    }

    /* animation ลอยเบา ๆ */
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }
  </style>
</head>

<body>

  <!-- โลโก้โปร่งใส -->
  <img src="pungver-512x512.png" class="logo" alt="PUNGVER Logo">

  <h1>PUNGVER</h1>

</body>
</html>
